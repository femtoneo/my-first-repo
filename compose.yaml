services:
  db:
    image: pgvector/pgvector:pg18
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skebob123
      POSTGRES_DB: ai_agent_db
    ports:
      - "5432:5432"
   

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: ai_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:skebob123@db:5432/ai_agent_db
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pg_data: